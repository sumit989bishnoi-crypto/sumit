<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeRescue | AI Bug Fixer</title>
    <!-- Tailwind CSS v3 via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        darkBg: '#0f172a',
                        darkPanel: '#1e293b',
                        darkBorder: '#334155'
                    }
                }
            }
        }
    </script>
    <!-- Basic Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-darkBg text-slate-200 min-h-screen flex flex-col items-center py-10 px-4">

    <!-- Header -->
    <header class="text-center mb-8 w-full max-w-4xl">
        <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">CodeRescue</h1>
        <p class="text-slate-400 text-lg">Instantly analyze and fix your broken code.</p>
    </header>

    <main class="w-full max-w-4xl grid grid-cols-1 gap-6">
        
        <!-- Input Section -->
        <section class="bg-darkPanel border border-darkBorder rounded-xl p-6 shadow-xl flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold text-white flex items-center gap-2">
                    <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                    Code Input
                </h2>
                <!-- Hidden language select, hardcoded to Python behind the scenes as per requested, but exposed for future expansibility -->
                <span class="text-xs bg-slate-700 px-2 py-1 rounded text-slate-300">Python</span>
            </div>
            
            <textarea id="codeInput" 
                class="w-full bg-[#0a0f1a] text-emerald-300 font-mono p-4 rounded-lg border border-darkBorder focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none resize-y min-h-[200px]" 
                placeholder="Paste your broken Python code here..."></textarea>
            
            <button id="analyzeBtn" class="mt-4 w-full bg-blue-600 hover:bg-blue-700 transition duration-200 text-white font-semibold py-3 px-4 rounded-lg flex justify-center items-center gap-2">
                <span>Analyze & Fix</span>
                <svg id="analyzeSpinner" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </section>

        <!-- Divider -->
        <div class="flex items-center my-2">
            <div class="flex-grow h-px bg-darkBorder"></div>
            <span class="mx-4 text-slate-500 font-medium">Result</span>
            <div class="flex-grow h-px bg-darkBorder"></div>
        </div>

        <!-- Output Section -->
        <section id="outputSection" class="bg-darkPanel border border-darkBorder rounded-xl p-6 shadow-xl flex flex-col hidden">
            
            <!-- Error Explanation -->
            <div class="mb-6">
                <h3 class="text-lg font-semibold text-rose-400 mb-2 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    Error Explanation
                </h3>
                <div class="bg-rose-950/30 border border-rose-900/50 p-4 rounded-lg text-rose-100">
                    <p id="errorExplanation">...</p>
                </div>
            </div>

            <!-- Fixed Code -->
            <div class="relative">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="text-lg font-semibold text-emerald-400 flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        Fixed Code
                    </h3>
                    <button id="copyBtn" class="text-sm bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded transition duration-200 flex items-center gap-1 text-slate-200">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        <span id="copyText">Copy</span>
                    </button>
                </div>
                <div class="bg-[#0a0f1a] rounded-lg border border-darkBorder overflow-x-auto min-h-[150px]">
                    <pre><code id="fixedCode" class="block p-4 text-emerald-300 font-mono text-sm"></code></pre>
                </div>
            </div>

        </section>

    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
